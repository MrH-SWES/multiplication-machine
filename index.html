<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Multiplication Machine | Math Things.</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #F5F5F7;
      --glass:     rgba(245,245,247,0.92);
      --surface:   #FFFFFF;
      --text-main: #1D1D1F;
      --text-gray: #86868B;
      --text-light:#AEAEB2;
      --accent:    #007AFF;
      --border:    rgba(0,0,0,0.07);

      --shadow-block: inset 2px 2px 0 rgba(255,255,255,0.45),
                      inset -2px -2px 0 rgba(0,0,0,0.13),
                      0 4px 12px rgba(0,0,0,0.18);
      --spring: cubic-bezier(0.34,1.56,0.64,1);

      --hundreds: #2E7D32;
      --tens:     #4169E1;
      --ones:     #DC143C;

      --zoom: 1;
      --cell: calc(36px * var(--zoom));
      --rail: calc(18px * var(--zoom));
    }

    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:'Lexend',sans-serif;
      background:var(--bg);
      color:var(--text-main);
      height:100dvh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      user-select:none;
      -webkit-user-select:none;
      -webkit-font-smoothing:antialiased;
    }

    /* ══════════════════════════════════════
       TOP LEVEL: bank-top + main-row + floor
    ══════════════════════════════════════ */
    .bank-top {
      height: 60px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      z-index: 10;
    }

    /* main row: canvas-side + alg-panel */
    .main-row {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ══════════════════════════════════════
       CANVAS SIDE
    ══════════════════════════════════════ */
    .canvas-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* grid-row: scroller + right bank */
    .grid-row {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .grid-scroller {
      flex: 1;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,.12) transparent;
      background: var(--bg);
      position: relative;
    }
    .grid-scroller::-webkit-scrollbar { width:6px; height:6px; }
    .grid-scroller::-webkit-scrollbar-thumb { background:rgba(0,0,0,.12); border-radius:3px; }

    /* Right bank */
    .bank-right {
      width: 60px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--surface);
      border-left: 1.5px solid var(--border);
    }

    /* ── Canvas (sized by JS) ── */
    #gCanvas {
      position: relative;
    }

    #topRail {
      position: absolute;
      display: flex;
      align-items: flex-end;
    }
    #rightRail {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    #arrayZone {
      position: absolute;
    }
    #gridSVG {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }

    /* ── SOURCE BLOCKS ── */
    .src {
      cursor: grab;
      border-radius: 5px;
      box-shadow: var(--shadow-block);
      flex-shrink: 0;
      transition: transform .15s var(--spring);
    }
    .src:hover  { transform: translateY(-2px) scale(1.06); }
    .src:active { transform: scale(.92); cursor: grabbing; }

    .src-ten-h { width:calc(var(--cell)*10); height:var(--rail); background:var(--tens); border-radius:4px; }
    .src-one-h { width:var(--cell);          height:var(--rail); background:var(--ones); border-radius:4px; }
    .src-ten-v { width:var(--rail); height:calc(var(--cell)*10); background:var(--tens); border-radius:4px; }
    .src-one-v { width:var(--rail); height:var(--cell);          background:var(--ones); border-radius:4px; }

    /* ── PLACED RAIL BLOCKS ── */
    .rb { flex-shrink:0; border-radius:4px; box-shadow:var(--shadow-block); }
    .rb.tens { background:var(--tens); }
    .rb.ones { background:var(--ones); }

    .rail-rest {
      flex:1; min-width:4px; min-height:4px;
      border:2px dashed rgba(0,0,0,.1); border-radius:5px;
      transition:border-color .15s, background .15s;
    }
    .rail-rest.over { border-color:var(--accent); background:rgba(0,122,255,.05); }

    /* ══════════════════════════════════════
       SQUEEGEE
    ══════════════════════════════════════ */
    .squeegee {
      position: absolute;
      width: 10px;
      border-radius: 5px;
      cursor: grab;
      z-index: 30;
      box-shadow: 0 2px 8px rgba(0,0,0,.3), inset 1px 0 0 rgba(255,255,255,.4);
      transition: box-shadow .15s, opacity .2s;
      touch-action: none;
    }
    .squeegee:active { cursor: grabbing; }
    .squeegee.sq-ones { background: var(--ones); }
    .squeegee.sq-tens { background: var(--tens); }

    .squeegee.locked {
      opacity: .35;
      cursor: not-allowed;
      pointer-events: none;
    }
    .squeegee.pulsing {
      animation: sqPulse 1.4s ease-in-out infinite;
    }
    @keyframes sqPulse {
      0%,100% { box-shadow: 0 2px 8px rgba(0,0,0,.3), inset 1px 0 0 rgba(255,255,255,.4); }
      50%      { box-shadow: 0 2px 8px rgba(0,0,0,.3), inset 1px 0 0 rgba(255,255,255,.4),
                             0 0 0 5px rgba(220,20,60,.25); }
    }

    /* ══════════════════════════════════════
       QUADRANT fills & ghost labels
    ══════════════════════════════════════ */
    /* Live fill drawn by the squeegee as it sweeps */
    .sweep-fill {
      position: absolute;
      pointer-events: none;
    }
    .sweep-fill.oo { background: rgba(220,20,60,.18); }
    .sweep-fill.to { background: rgba(65,105,225,.18); }

    /* Ghost — left behind after harvest */
    .quad-ghost {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      letter-spacing: -0.04em;
      pointer-events: none;
      border-radius: 3px;
    }
    .quad-ghost.oo { background: rgba(220,20,60,.07);  color: rgba(220,20,60,.55); }
    .quad-ghost.to { background: rgba(65,105,225,.07); color: rgba(65,105,225,.55); }

    /* Harvestable fill — clickable, pulses */
    .harvest-fill {
      position: absolute;
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      letter-spacing: -0.04em;
      animation: harvestPulse 1.2s ease-in-out infinite;
    }
    .harvest-fill.oo { background: rgba(220,20,60,.22); color: rgba(220,20,60,.7); }
    .harvest-fill.to { background: rgba(65,105,225,.22); color: rgba(65,105,225,.7); }
    @keyframes harvestPulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .7; }
    }

    /* ══════════════════════════════════════
       DASHBOARD FLOOR
    ══════════════════════════════════════ */
    .dashboard-floor {
      height: 120px;
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 24px;
    }

    .bin-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .bin-label {
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-light);
    }
    .bin {
      min-width: 96px;
      max-width: 180px;
      height: 68px;
      border-radius: 14px;
      border: 2px dashed rgba(0,0,0,.12);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 6px 8px;
      transition: border-color .2s, background .2s, transform .15s var(--spring);
      position: relative;
    }
    .bin.hundreds-bin { border-color: rgba(46,125,50,.35); }
    .bin.tens-bin     { border-color: rgba(65,105,225,.35); }
    .bin.ones-bin     { border-color: rgba(220,20,60,.35); }

    .bin.accepting {
      border-style: solid;
      transform: scale(1.04);
    }
    .bin.hundreds-bin.accepting { border-color:var(--hundreds); background:rgba(46,125,50,.06); }
    .bin.tens-bin.accepting     { border-color:var(--tens);     background:rgba(65,105,225,.06); }
    .bin.ones-bin.accepting     { border-color:var(--ones);     background:rgba(220,20,60,.06); }

    /* ── PHYSICAL BLOCKS inside bins ── */
    .cube, .ten-bar, .hundred-flat {
      flex-shrink: 0;
      border-radius: 3px;
      box-shadow: inset 1px 1px 0 rgba(255,255,255,.5), inset -1px -1px 0 rgba(0,0,0,.18), 0 2px 4px rgba(0,0,0,.22);
      position: relative;
    }
    /* Ones: small red square */
    .cube {
      width: 11px;
      height: 11px;
      background: var(--ones);
      border-radius: 2px;
    }
    /* Tens: blue horizontal stick */
    .ten-bar {
      width: 32px;
      height: 10px;
      background: var(--tens);
      border-radius: 3px;
    }
    /* Hundreds: green square flat */
    .hundred-flat {
      width: 26px;
      height: 26px;
      background: var(--hundreds);
      border-radius: 3px;
    }

    /* Flying block — fixed position, animated to bin */
    .block-fly {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      border-radius: 3px;
      box-shadow: inset 1px 1px 0 rgba(255,255,255,.5), inset -1px -1px 0 rgba(0,0,0,.18), 0 3px 8px rgba(0,0,0,.3);
    }
    .block-fly.cube         { width:11px; height:11px; background:var(--ones); }
    .block-fly.ten-bar      { width:32px; height:10px; background:var(--tens); }
    .block-fly.hundred-flat { width:26px; height:26px; background:var(--hundreds); }

    /* Pop-in animation once settled in bin */
    .block-settle {
      animation: blockSettle .28s var(--spring) both;
    }
    @keyframes blockSettle {
      0%   { transform: scale(0.4) translateY(6px); opacity:0; }
      100% { transform: scale(1)   translateY(0);   opacity:1; }
    }

    /* ── OVERFLOW STATE ── */
    .bin.overflow {
      border-style: solid !important;
      animation: overflowPulse 0.9s ease-in-out infinite;
      cursor: pointer;
    }
    @keyframes overflowPulse {
      0%,100% { border-color: #FF9500; box-shadow: 0 0 0 0 rgba(255,149,0,0); }
      45%     { border-color: #FF3B30; box-shadow: 0 0 0 6px rgba(255,59,48,.22); }
    }
    .bin.overflow::after {
      content: 'CLICK TO REGROUP';
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: .44rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #FF3B30;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── ALG PANEL LOCK OVERLAY ── */
    .alg-panel {
      position: relative; /* needed for overlay child */
    }
    .alg-lock-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(245,245,247,0.72);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 40;
      border-radius: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }
    .alg-lock-overlay.active { display: flex; }
    .alg-lock-icon {
      font-size: 1.8rem;
    }
    .alg-lock-msg {
      font-size: .6rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #FF3B30;
      text-align: center;
      padding: 0 16px;
    }

    /* Carry block animation */
    .carry-fly {
      position: fixed;
      pointer-events: none;
      z-index: 250;
      border-radius: 3px;
      box-shadow: 0 4px 16px rgba(0,0,0,.35);
    }
    .carry-fly.ten-bar      { width:32px; height:10px; background:var(--tens); }
    .carry-fly.hundred-flat { width:26px; height:26px; background:var(--hundreds); }

    /* Bin count badge */
    .bin-count {
      position: absolute;
      bottom: -6px; right: -6px;
      background: var(--text-main);
      color: white;
      font-size: .6rem;
      font-weight: 800;
      border-radius: 99px;
      padding: 1px 6px;
      min-width: 20px;
      text-align: center;
      opacity: 0;
      transition: opacity .2s;
    }
    .bin-count.show { opacity: 1; }

    /* Divider between bin groups */
    .bin-divider {
      width: 1px;
      height: 50px;
      background: var(--border);
      align-self: center;
    }

    /* ══════════════════════════════════════
       ALGORITHM PANEL
    ══════════════════════════════════════ */
    .alg-panel {
      width: 200px;
      flex-shrink: 0;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding: 32px 20px 24px;
      overflow-y: auto;
    }

    .alg-problem {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
      margin-bottom: 4px;
    }
    .alg-row { display:flex; align-items:baseline; gap:0; }
    .alg-sym {
      font-size:1.9rem; font-weight:900; color:var(--text-light);
      line-height:42px; margin-right:2px;
    }
    .ad {
      width:30px; height:42px; text-align:center; line-height:42px;
      font-size:2.3rem; font-weight:800; letter-spacing:-0.04em; border-radius:8px;
    }
    .ad.t   { color:var(--tens); }
    .ad.o   { color:var(--ones); }
    .ad.pop { animation:dPop .35s var(--spring) both; }
    @keyframes dPop {
      0%   { transform:scale(.5) translateY(8px); opacity:0; }
      100% { transform:scale(1)  translateY(0);   opacity:1; }
    }
    .alg-line { height:2.5px; background:var(--text-main); width:100%; border-radius:2px; margin:5px 0 4px; }

    .pp-section { width:100%; display:flex; flex-direction:column; gap:1px; margin-bottom:4px; }
    .pp-row {
      display:flex; align-items:baseline; justify-content:flex-end; gap:0;
      opacity:.12; transition:opacity .4s;
    }
    .pp-row.lit { opacity:1; }
    .pd {
      width:30px; height:42px; text-align:center; line-height:42px;
      font-size:2.3rem; font-weight:800; letter-spacing:-0.04em;
      color:var(--text-main); border-radius:8px;
    }
    .pd.zero { color:var(--text-light); }
    .pd.pop  { animation:dPop .35s var(--spring) both; }

    .sum-line { height:2.5px; background:var(--text-main); width:100%; border-radius:2px; margin:4px 0; opacity:.12; transition:opacity .4s; }
    .sum-line.lit { opacity:1; }

    .total-row { display:flex; align-items:baseline; justify-content:flex-end; gap:0; opacity:.12; transition:opacity .4s; margin-bottom:20px; }
    .total-row.lit { opacity:1; }
    .td { width:30px; height:50px; text-align:center; line-height:50px; font-size:2.8rem; font-weight:900; letter-spacing:-0.04em; color:var(--text-main); border-radius:8px; }
    .td.pop { animation:dPop .5s var(--spring) both; }

    .dist-grid { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:5px; opacity:0; transition:opacity .5s; }
    .dist-grid.show { opacity:1; }
    .dc { border-radius:10px; padding:7px 5px; display:flex; flex-direction:column; align-items:center; gap:2px; }
    .dc.tt { background:rgba(46,125,50,.1); }
    .dc.ot,.dc.to { background:rgba(65,105,225,.1); }
    .dc.oo { background:rgba(220,20,60,.1); }
    .dc-val { font-size:1rem; font-weight:800; letter-spacing:-0.04em; }
    .dc.tt .dc-val { color:var(--hundreds); }
    .dc.ot .dc-val,.dc.to .dc-val { color:var(--tens); }
    .dc.oo .dc-val { color:var(--ones); }
    .dc-eq { font-size:.58rem; font-weight:600; color:var(--text-gray); }

    /* Watermark + zoom */
    .watermark {
      position:fixed; bottom:8px; left:12px;
      font-weight:900; font-size:.8rem; letter-spacing:-0.05em;
      color:var(--text-light); pointer-events:none; z-index:5;
    }
    .wbead {
      width:.2em; height:.2em; border-radius:50%; display:inline-block;
      margin-left:.04em; margin-bottom:.07em;
      background:linear-gradient(135deg,#e0e0e0,#a0a0a0,#d0d0d0);
      box-shadow:0 1px 3px rgba(0,0,0,.2);
    }
    .zoom-pill {
      position:fixed; bottom:8px; right:212px;
      display:flex; align-items:center; gap:7px;
      background:var(--surface); border:1px solid var(--border); border-radius:99px;
      padding:4px 12px; box-shadow:0 2px 8px rgba(0,0,0,.07); z-index:50;
    }
    .zoom-pill svg { color:var(--text-light); }
    .zoom-slider { width:72px; cursor:pointer; accent-color:var(--accent); }
  </style>
</head>
<body>

<!-- Top bank -->
<div class="bank-top" id="bankTop"></div>

<!-- Main row -->
<div class="main-row">

  <div class="canvas-side">
    <div class="grid-row">
      <div class="grid-scroller" id="gridScroller">
        <div id="gCanvas">
          <div id="topRail"></div>
          <div id="rightRail"></div>
          <div id="arrayZone">
            <svg id="gridSVG"></svg>
          </div>
          <!-- Squeegees are appended here by JS, inside gCanvas -->
        </div>
      </div>
      <div class="bank-right" id="bankRight"></div>
    </div>

    <!-- Dashboard floor with bins -->
    <div class="dashboard-floor">
      <div class="bin-group">
        <div class="bin-label">Hundreds</div>
        <div class="bin hundreds-bin" id="binH">
          <span class="bin-count" id="cntH">0</span>
        </div>
      </div>
      <div class="bin-divider"></div>
      <div class="bin-group">
        <div class="bin-label">Tens</div>
        <div class="bin tens-bin" id="binT">
          <span class="bin-count" id="cntT">0</span>
        </div>
      </div>
      <div class="bin-divider"></div>
      <div class="bin-group">
        <div class="bin-label">Ones</div>
        <div class="bin ones-bin" id="binO">
          <span class="bin-count" id="cntO">0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Algorithm panel -->
  <div class="alg-panel">
    <div class="alg-lock-overlay" id="algLock">
      <div class="alg-lock-icon">🔒</div>
      <div class="alg-lock-msg">Regroup overflow<br>before recording</div>
    </div>
    <div class="alg-problem">
      <div class="alg-row">
        <div class="ad t" id="aA_T"></div>
        <div class="ad o" id="aA_O"></div>
      </div>
      <div class="alg-row">
        <span class="alg-sym">×</span>
        <div class="ad t" id="aB_T"></div>
        <div class="ad o" id="aB_O"></div>
      </div>
      <div class="alg-line"></div>
    </div>
    <div class="pp-section">
      <div class="pp-row" id="pp1">
        <div class="pd" id="p1_TH"></div>
        <div class="pd" id="p1_H"></div>
        <div class="pd" id="p1_T"></div>
        <div class="pd" id="p1_O"></div>
      </div>
      <div class="pp-row" id="pp2">
        <div class="pd" id="p2_TH"></div>
        <div class="pd" id="p2_H"></div>
        <div class="pd" id="p2_T"></div>
        <div class="pd zero" id="p2_0"></div>
      </div>
    </div>
    <div class="sum-line" id="sumLine"></div>
    <div class="total-row" id="totalRow">
      <div class="td" id="t_TH"></div>
      <div class="td" id="t_H"></div>
      <div class="td" id="t_T"></div>
      <div class="td" id="t_O"></div>
    </div>
    <div class="dist-grid" id="distGrid">
      <div class="dc tt"><div class="dc-val" id="dm_tt"></div><div class="dc-eq" id="dm_tt_eq"></div></div>
      <div class="dc ot"><div class="dc-val" id="dm_ot"></div><div class="dc-eq" id="dm_ot_eq"></div></div>
      <div class="dc to"><div class="dc-val" id="dm_to"></div><div class="dc-eq" id="dm_to_eq"></div></div>
      <div class="dc oo"><div class="dc-val" id="dm_oo"></div><div class="dc-eq" id="dm_oo_eq"></div></div>
    </div>
  </div>
</div>

<div class="watermark">Math Things<span class="wbead"></span></div>
<div class="zoom-pill">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input type="range" id="zoomSlider" class="zoom-slider" min="0.35" max="2" step="0.05" value="1">
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════
// GEOMETRY helpers
// ═══════════════════════════════════════════════════
function cp() {
  return 36 * parseFloat(document.documentElement.style.getPropertyValue('--zoom') || 1);
}
function rp() { return cp() * 0.5; }  // rail bar thickness
const GAP = 8; // px gap between array right edge and right rail

// ═══════════════════════════════════════════════════
// RAIL STATE
// topSegs:   [10,10,1,1]  → tens go LEFT, ones go RIGHT  → total = A
// rightSegs: [10,10,1,1]  → tens go TOP,  ones go BOTTOM → total = B
// ═══════════════════════════════════════════════════
let topSegs   = [];
let rightSegs = [];

function totalTop()   { return topSegs.reduce((s,x)=>s+x,0); }
function totalRight() { return rightSegs.reduce((s,x)=>s+x,0); }

function factorA() {
  const u=totalTop();
  return { total:u, tens:Math.floor(u/10)*10, ones:u%10, T:Math.floor(u/10), O:u%10 };
}
function factorB() {
  const u=totalRight();
  return { total:u, tens:Math.floor(u/10)*10, ones:u%10, T:Math.floor(u/10), O:u%10 };
}

// ═══════════════════════════════════════════════════
// SQUEEGEE STATE  (Phase 1: red squeegee only)
//
// The squeegee is positioned in gCanvas coordinates.
// It starts at the RIGHT edge of the array and drags LEFT.
//
// Hard stops:
//   Stop 1: at x = A.tens * cp()   (the ones/tens column boundary)
//            → locks until the oo quadrant is harvested
//   Stop 2: at x = 0               (the left edge of the array)
//            → after oo harvested, can sweep through tens zone
//
// sweepX: current left edge of the squeegee (in array-zone coords)
//         The squeegee's left CSS position in gCanvas = arrayLeft + sweepX
// ═══════════════════════════════════════════════════

// Sweep state machine
// 'idle'          – rails not set, no squeegee shown
// 'ready'         – squeegee sitting at right edge, ready to drag
// 'sweeping-oo'   – dragging left through the ones-cols zone
// 'stopped-oo'    – locked at A.tens boundary, oo fill ready to harvest
// 'harvested-oo'  – oo done, unlocked to continue into tens zone
// 'sweeping-to'   – dragging left through the tens-cols zone
// 'stopped-to'    – locked at left edge, to fill ready to harvest
// 'done'          – both sweeps harvested
let sweepState = 'idle';
let sweepX     = 0;   // current x of squeegee left edge, in arrayZone coords

// ═══════════════════════════════════════════════════
// BIN STATE
// ═══════════════════════════════════════════════════
let binOnes     = 0;
let binTens     = 0;
let binHundreds = 0;

// ═══════════════════════════════════════════════════
// LAYOUT  — called whenever rails change or zoom changes
// ═══════════════════════════════════════════════════
function layout() {
  const C = cp(), R = rp();
  const A = factorA(), B = factorB();
  const W = A.total * C;
  const H = B.total * C;

  // Canvas size: [topRail above array] [array] [gap + rightRail to the right]
  const canvasW = W + GAP + R + 32;
  const canvasH = R + H + 32;

  const canvas = document.getElementById('gCanvas');
  canvas.style.width  = canvasW + 'px';
  canvas.style.height = canvasH + 'px';

  // Top rail: x=0 (from canvas left), y=0
  const topRail = document.getElementById('topRail');
  topRail.style.top    = '0';
  topRail.style.left   = '0';
  topRail.style.height = R + 'px';
  topRail.style.width  = (W || 60) + 'px';

  // Array zone: below top rail
  const arrayLeft = 0;
  const arrayTop  = R;
  const az = document.getElementById('arrayZone');
  az.style.left   = arrayLeft + 'px';
  az.style.top    = arrayTop  + 'px';
  az.style.width  = W + 'px';
  az.style.height = H + 'px';

  const svg = document.getElementById('gridSVG');
  svg.style.width  = W + 'px';
  svg.style.height = H + 'px';
  svg.setAttribute('width',  W || 0);
  svg.setAttribute('height', H || 0);

  // Right rail: to the right of the array, same top as array
  const rightRail = document.getElementById('rightRail');
  rightRail.style.top   = arrayTop + 'px';
  rightRail.style.left  = (W + GAP) + 'px';
  rightRail.style.width = R + 'px';
  rightRail.style.height= (H || 60) + 'px';

  drawGrid(C, A, B);
  renderTopRail(C, R, A);
  renderRightRail(C, R, B);
  updateAlg(A, B);
  placeSqueegee(C, R, A, B);
  renderSweepFill(C, A, B);
}

// ═══════════════════════════════════════════════════
// GRID
// ═══════════════════════════════════════════════════
function drawGrid(C, A, B) {
  const svg = document.getElementById('gridSVG');
  svg.innerHTML = '';
  if (!A.total || !B.total) return;
  const W = A.total*C, H = B.total*C;

  const ln = (x1,y1,x2,y2,col,w,dash='') => {
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1);
    l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke',col); l.setAttribute('stroke-width',w);
    if (dash) l.setAttribute('stroke-dasharray',dash);
    svg.appendChild(l);
  };

  for (let x=0; x<=A.total; x++) {
    const maj = x===0 || x===A.total || (A.ones>0 && x===A.tens);
    ln(x*C,0,x*C,H, maj?'rgba(0,0,0,.22)':'rgba(0,0,0,.07)', maj?1.5:.5);
  }
  for (let y=0; y<=B.total; y++) {
    const maj = y===0 || y===B.total || (B.ones>0 && y===B.tens);
    ln(0,y*C,W,y*C, maj?'rgba(0,0,0,.22)':'rgba(0,0,0,.07)', maj?1.5:.5);
  }

  // Dashed quadrant dividers
  if (A.T>0 && A.O>0) ln(A.tens*C,0,A.tens*C,H,'rgba(0,0,0,.32)',2,'7 4');
  if (B.T>0 && B.O>0) ln(0,B.tens*C,W,B.tens*C,'rgba(0,0,0,.32)',2,'7 4');
}

// ═══════════════════════════════════════════════════
// RAILS
// ═══════════════════════════════════════════════════
function dropHandler(axis) {
  return {
    over:  e => { e.preventDefault(); e.currentTarget.classList.add('over'); },
    leave: e => { e.currentTarget.classList.remove('over'); },
    drop:  e => {
      e.preventDefault();
      e.currentTarget.classList.remove('over');
      const kind = e.dataTransfer.getData('kind');
      const ax   = e.dataTransfer.getData('axis');
      if (ax !== axis) return;
      if (axis==='h') addTop(kind==='ten'?10:1);
      else            addRight(kind==='ten'?10:1);
    }
  };
}

function renderTopRail(C, R, A) {
  const rail = document.getElementById('topRail');
  rail.innerHTML = '';
  topSegs.forEach(s => {
    const el = document.createElement('div');
    el.className = 'rb ' + (s===10?'tens':'ones');
    el.style.height = R+'px';
    el.style.width  = (s===10 ? C*10 : C)+'px';
    el.style.borderRadius = '3px';
    rail.appendChild(el);
  });
  if (A.total < 99) {
    const dz = document.createElement('div');
    dz.className = 'rail-rest';
    dz.style.height = R+'px';
    const dh = dropHandler('h');
    dz.addEventListener('dragover', dh.over);
    dz.addEventListener('dragleave', dh.leave);
    dz.addEventListener('drop', dh.drop);
    rail.appendChild(dz);
  }
}

function renderRightRail(C, R, B) {
  const rail = document.getElementById('rightRail');
  rail.innerHTML = '';
  rightSegs.forEach(s => {
    const el = document.createElement('div');
    el.className = 'rb ' + (s===10?'tens':'ones');
    el.style.width  = R+'px';
    el.style.height = (s===10 ? C*10 : C)+'px';
    el.style.borderRadius = '3px';
    rail.appendChild(el);
  });
  if (B.total < 99) {
    const dz = document.createElement('div');
    dz.className = 'rail-rest';
    dz.style.width = R+'px';
    const dh = dropHandler('v');
    dz.addEventListener('dragover', dh.over);
    dz.addEventListener('dragleave', dh.leave);
    dz.addEventListener('drop', dh.drop);
    rail.appendChild(dz);
  }
}

function addTop(units) {
  if (totalTop() + units > 99) return;
  topSegs.push(units);
  // reset sweep if rails change
  resetSweep();
  layout();
}
function addRight(units) {
  if (totalRight() + units > 99) return;
  rightSegs.push(units);
  resetSweep();
  layout();
}
function resetSweep() {
  sweepState = 'idle';
  sweepX = 0;
  // Remove existing squeegee
  document.querySelectorAll('.squeegee').forEach(e=>e.remove());
  // Remove fills
  document.querySelectorAll('.sweep-fill,.harvest-fill,.quad-ghost').forEach(e=>e.remove());
}

// ═══════════════════════════════════════════════════
// SQUEEGEE  — placement & drag
// ═══════════════════════════════════════════════════
function placeSqueegee(C, R, A, B) {
  // Only show if both rails have blocks
  if (!A.total || !B.total) return;

  // Transition to 'ready' when rails are set and we were idle
  if (sweepState === 'idle') {
    sweepState = 'ready';
    sweepX = A.total * C; // start at the RIGHT edge of the array
  }

  // Red squeegee always spans the ones-rows of B (bottom region)
  // Height = B.ones rows. If B has no tens (pure ones number), spans all rows.
  const sqHeight = B.ones > 0 ? B.ones * C : B.total * C;
  // Y position of squeegee = top of the ones-rows zone
  const sqTop    = R + (B.tens * C); // in gCanvas coords (rail height + tens rows)

  // Remove & re-create (cheap, keeps event listeners clean)
  let sq = document.getElementById('sq-ones');
  if (!sq) {
    sq = document.createElement('div');
    sq.id = 'sq-ones';
    sq.className = 'squeegee sq-ones';
    document.getElementById('gCanvas').appendChild(sq);
    initSqueegeDrag(sq);
  }

  sq.style.top    = sqTop + 'px';
  sq.style.height = sqHeight + 'px';
  sq.style.width  = '10px';

  // X position = arrayLeft + sweepX, minus half the squeegee width for centering
  const sqLeft = 0 + sweepX - 5; // arrayLeft=0
  sq.style.left = sqLeft + 'px';

  // Lock/unlock based on state
  const locked = (sweepState === 'stopped-oo');
  sq.classList.toggle('locked', locked);
  sq.classList.toggle('pulsing',
    sweepState === 'ready' || sweepState === 'harvested-oo'
  );
}

function initSqueegeDrag(sq) {
  let dragging = false;
  let startClientX, startSweepX;

  const onStart = (clientX) => {
    const A = factorA();
    if (!A.total) return;
    if (sweepState === 'stopped-oo') return; // locked

    dragging = true;
    startClientX = clientX;
    startSweepX  = sweepX;
    sq.classList.remove('pulsing');
    sq.style.cursor = 'grabbing';
  };

  const onMove = (clientX) => {
    if (!dragging) return;
    const C  = cp();
    const A  = factorA();
    const B  = factorB();
    const dx = clientX - startClientX;

    let newX = startSweepX + dx;

    // Hard stop logic
    if (sweepState === 'ready' || sweepState === 'sweeping-oo') {
      // Can only sweep left, can't go right of start position
      newX = Math.min(A.total * C, newX);

      // Stop at the ones/tens boundary (A.tens * C) if there is one
      const stopX = A.T > 0 ? A.tens * C : 0;
      if (newX <= stopX) {
        newX = stopX;
        sweepState = 'stopped-oo';
        showHarvestFill(C, A, B);
      } else {
        sweepState = 'sweeping-oo';
      }
    } else if (sweepState === 'harvested-oo' || sweepState === 'sweeping-to') {
      // Can sweep left from where we were (A.tens * C) to 0
      newX = Math.min(A.tens * C, newX);
      newX = Math.max(0, newX);
      if (newX === 0) {
        sweepState = 'stopped-to';
        showHarvestFill(C, A, B);
      } else {
        sweepState = 'sweeping-to';
      }
    }

    sweepX = newX;
    renderSweepFill(C, A, B);
    updateSqPosition();
  };

  const onEnd = () => {
    if (!dragging) return;
    dragging = false;
    sq.style.cursor = '';
    const A = factorA();
    const B = factorB();
    const C = cp();
    if (sweepState !== 'stopped-oo' && sweepState !== 'stopped-to') {
      sq.classList.add('pulsing');
    }
    renderSweepFill(C, A, B);
    updateSqPosition();
  };

  // Mouse
  sq.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX); });
  document.addEventListener('mousemove', e => onMove(e.clientX));
  document.addEventListener('mouseup', onEnd);

  // Touch
  sq.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientX); }, {passive:false});
  document.addEventListener('touchmove', e => { if(dragging) { e.preventDefault(); onMove(e.touches[0].clientX); } }, {passive:false});
  document.addEventListener('touchend', onEnd);
}

function updateSqPosition() {
  const sq = document.getElementById('sq-ones');
  if (!sq) return;
  sq.style.left = (sweepX - 5) + 'px';
}

// ═══════════════════════════════════════════════════
// SWEEP FILL  — live fill as squeegee drags
// ═══════════════════════════════════════════════════
function renderSweepFill(C, A, B) {
  // Remove live fills (not ghosts or harvest fills)
  document.querySelectorAll('.sweep-fill').forEach(e=>e.remove());

  if (!A.total || !B.total) return;
  if (sweepState==='idle'||sweepState==='ready') return;
  if (sweepState==='stopped-oo'||sweepState==='stopped-to') return; // harvest fill handles it
  if (sweepState==='done') return;

  const az = document.getElementById('arrayZone');

  if (sweepState==='sweeping-oo' || sweepState==='harvested-oo') {
    // Fill the oo zone: from sweepX to A.total, rows B.tens to B.total
    const fillLeft  = sweepX;
    const fillRight = A.total * C;
    const fillW     = fillRight - fillLeft;
    const fillTop   = B.tens * C;
    const fillH     = B.ones * C || B.total * C; // if no tens, full height
    if (fillW > 0 && fillH > 0) {
      const fill = document.createElement('div');
      fill.className = 'sweep-fill oo';
      fill.style.left   = fillLeft + 'px';
      fill.style.top    = fillTop  + 'px';
      fill.style.width  = fillW + 'px';
      fill.style.height = fillH + 'px';
      az.appendChild(fill);
    }
  }

  if (sweepState==='sweeping-to') {
    // Fill the to zone: from sweepX to A.tens, rows B.tens to B.total
    const fillLeft  = sweepX;
    const fillRight = A.tens * C;
    const fillW     = fillRight - fillLeft;
    const fillTop   = B.tens * C;
    const fillH     = B.ones * C;
    if (fillW > 0 && fillH > 0) {
      const fill = document.createElement('div');
      fill.className = 'sweep-fill to';
      fill.style.left   = fillLeft + 'px';
      fill.style.top    = fillTop  + 'px';
      fill.style.width  = fillW + 'px';
      fill.style.height = fillH + 'px';
      az.appendChild(fill);
    }
  }
}

// ═══════════════════════════════════════════════════
// HARVEST FILL  — shown when squeegee is locked at a stop
// ═══════════════════════════════════════════════════
function showHarvestFill(C, A, B) {
  // Remove any previous harvest fill
  document.querySelectorAll('.harvest-fill').forEach(e=>e.remove());

  const az = document.getElementById('arrayZone');

  if (sweepState === 'stopped-oo') {
    // The oo quadrant: x from A.tens to A.total, y from B.tens to B.total
    const x = A.tens * C;
    const y = B.tens * C;
    const w = A.ones * C;
    const h = (B.ones > 0 ? B.ones : B.total) * C;
    const val = A.ones * (B.ones > 0 ? B.ones : B.total);
    if (w > 0 && h > 0) {
      const hf = makeHarvestFill('oo', x, y, w, h, val, C);
      az.appendChild(hf);
      hf.addEventListener('click', () => harvestQuadrant('oo', val, A, B, C));
    }
  } else if (sweepState === 'stopped-to') {
    // The to quadrant: x from 0 to A.tens, y from B.tens to B.total
    const x = 0;
    const y = B.tens * C;
    const w = A.tens * C;
    const h = B.ones * C;
    const val = A.tens * B.ones;
    if (w > 0 && h > 0) {
      const hf = makeHarvestFill('to', x, y, w, h, val, C);
      az.appendChild(hf);
      hf.addEventListener('click', () => harvestQuadrant('to', val, A, B, C));
    }
  }
}

function makeHarvestFill(cls, x, y, w, h, val, C) {
  const el = document.createElement('div');
  el.className = 'harvest-fill ' + cls;
  el.style.left   = x + 'px';
  el.style.top    = y + 'px';
  el.style.width  = w + 'px';
  el.style.height = h + 'px';
  el.style.fontSize = Math.min(C * 0.9, 48) + 'px';
  el.textContent = val;
  return el;
}

// ═══════════════════════════════════════════════════
// HARVEST  — click fill → spawn discrete blocks → ghost
// ═══════════════════════════════════════════════════
function harvestQuadrant(cls, val, A, B, C) {
  document.querySelectorAll('.harvest-fill').forEach(e=>e.remove());

  // ── Determine quadrant screen rect for fly-from origin ──
  const az = document.getElementById('arrayZone');
  const azRect = az.getBoundingClientRect();

  let qx,qy,qw,qh;
  if (cls === 'oo') {
    qx = A.tens*C; qy = B.tens*C;
    qw = A.ones*C; qh = (B.ones>0?B.ones:B.total)*C;
  } else {
    qx = 0; qy = B.tens*C;
    qw = A.tens*C; qh = B.ones*C;
  }

  // Origin for fly animation: center of quadrant in viewport coords
  const originX = azRect.left + qx + qw/2;
  const originY = azRect.top  + qy + qh/2;

  // ── Leave ghost ──
  const ghost = document.createElement('div');
  ghost.className = 'quad-ghost ' + cls;
  ghost.style.left      = qx+'px'; ghost.style.top    = qy+'px';
  ghost.style.width     = qw+'px'; ghost.style.height = qh+'px';
  ghost.style.fontSize  = Math.min(C*0.85,44)+'px';
  ghost.textContent     = val;
  az.appendChild(ghost);

  // ── Determine block type & target bin ──
  // oo (ones×ones) → .cube → ones bin
  // to (tens×ones or ones×tens) → .ten-bar → tens bin
  // We only support oo and to quadrants in Phase 1/2
  const blockType = (cls === 'oo') ? 'cube' : 'ten-bar';
  const binType   = (cls === 'oo') ? 'ones' : 'tens';

  spawnBlocks(blockType, val, binType, originX, originY);

  // ── Advance squeegee state machine ──
  if (cls === 'oo') {
    sweepState = 'harvested-oo';
    const sq = document.getElementById('sq-ones');
    if (sq) { sq.classList.remove('locked'); sq.classList.add('pulsing'); }
    if (A.T === 0) {
      sweepState = 'done';
      if (sq) sq.classList.remove('pulsing');
    }
  } else if (cls === 'to') {
    sweepState = 'done';
    const sq = document.getElementById('sq-ones');
    if (sq) { sq.classList.remove('pulsing','locked'); sq.style.opacity='.25'; sq.style.pointerEvents='none'; }
  }

  renderSweepFill(C, A, B);
}

// ═══════════════════════════════════════════════════
// STEP 1 — spawnBlocks(type, count, targetBin, originX, originY)
// Creates discrete DOM elements and animates them into the bin
// ═══════════════════════════════════════════════════
function spawnBlocks(type, count, binType, originX, originY) {
  const binEl = binType==='ones'     ? document.getElementById('binO')
              : binType==='tens'     ? document.getElementById('binT')
              :                        document.getElementById('binH');

  // Update logical count
  if (binType==='ones')         binOnes     += count;
  else if (binType==='tens')    binTens     += count;
  else                          binHundreds += count;

  const binRect = binEl.getBoundingClientRect();
  const destX   = binRect.left + binRect.width/2;
  const destY   = binRect.top  + binRect.height/2;

  // Stagger each block's launch
  const MAX_VISUAL = 30; // cap DOM blocks rendered
  const visualCount = Math.min(count, MAX_VISUAL);

  for (let i = 0; i < visualCount; i++) {
    const delay = i * Math.min(60, 400/visualCount); // tighten stagger for many blocks

    setTimeout(() => {
      // 1. Create flying clone
      const fly = document.createElement('div');
      fly.className = `block-fly ${type}`;
      fly.style.left      = (originX - (type==='cube'?5.5:16)) + 'px';
      fly.style.top       = (originY - (type==='cube'?5.5:5))  + 'px';
      fly.style.transition= 'none';
      document.body.appendChild(fly);

      // 2. Animate toward bin center with slight arc
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const dur = 340 + Math.random()*80;
          const jitterX = (Math.random()-0.5)*30;
          fly.style.transition = `left ${dur}ms cubic-bezier(0.4,0,1,1), top ${dur}ms cubic-bezier(0.3,0,0.7,1), opacity ${dur}ms`;
          fly.style.left = (destX + jitterX - (type==='cube'?5.5:16)) + 'px';
          fly.style.top  = (destY - (type==='cube'?5.5:5)) + 'px';
          fly.style.opacity = '0.4';

          setTimeout(() => {
            fly.remove();
            // 3. Settle: add real block inside bin
            const block = document.createElement('div');
            block.className = `${type} block-settle`;
            block.style.animationDelay = '0ms';
            binEl.appendChild(block);
            // Keep count badge above blocks
            const badge = binEl.querySelector('.bin-count');
            if (badge) binEl.appendChild(badge);

            // Flash bin
            binEl.classList.add('accepting');
            setTimeout(()=>binEl.classList.remove('accepting'), 350);

            updateBinCounts();
            checkOverflows();
          }, dur);
        });
      });
    }, delay);
  }

  // If count > MAX_VISUAL, schedule a final count update after all land
  if (count > MAX_VISUAL) {
    const totalDelay = visualCount * Math.min(60, 400/visualCount) + 420;
    setTimeout(() => { updateBinCounts(); checkOverflows(); }, totalDelay);
  }
}

// ═══════════════════════════════════════════════════
// STEP 2 — checkOverflows()
// Inspects all bins; applies/clears .overflow; locks alg panel
// ═══════════════════════════════════════════════════
function checkOverflows() {
  const bins = [
    { el: document.getElementById('binH'), count: binHundreds, type: 'hundreds' },
    { el: document.getElementById('binT'), count: binTens,     type: 'tens' },
    { el: document.getElementById('binO'), count: binOnes,     type: 'ones' },
  ];

  let anyOverflow = false;
  bins.forEach(({ el, count, type }) => {
    const over = count >= 10;
    if (over) anyOverflow = true;
    el.classList.toggle('overflow', over);
  });

  // Lock / unlock alg panel
  const overlay = document.getElementById('algLock');
  overlay.classList.toggle('active', anyOverflow);
}

// ═══════════════════════════════════════════════════
// STEP 3 — triggerRegroup(binEl, binType)
// Destroy 10 units, spawn 1 higher-order carry block, animate carry to next bin
// ═══════════════════════════════════════════════════
function triggerRegroup(binEl, binType) {
  // Determine counts & types
  let fromCount, toType, toEl, carryClass;
  if (binType === 'ones') {
    if (binOnes < 10) return;
    binOnes -= 10;
    fromCount = binOnes;
    toType    = 'tens';
    toEl      = document.getElementById('binT');
    binTens  += 1;
    carryClass = 'ten-bar';
  } else if (binType === 'tens') {
    if (binTens < 10) return;
    binTens -= 10;
    fromCount = binTens;
    toType    = 'hundreds';
    toEl      = document.getElementById('binH');
    binHundreds += 1;
    carryClass  = 'hundred-flat';
  } else {
    return; // hundreds can't carry further in this context
  }

  // ── Rebuild FROM bin's block DOM ──
  rebuildBinDOM(binEl, binType);

  // ── Carry animation ──
  const fromRect = binEl.getBoundingClientRect();
  const toRect   = toEl.getBoundingClientRect();

  const carry = document.createElement('div');
  carry.className = `carry-fly ${carryClass}`;
  carry.style.left = (fromRect.left + fromRect.width/2 - (carryClass==='ten-bar'?16:13)) + 'px';
  carry.style.top  = (fromRect.top  + fromRect.height/2 - (carryClass==='ten-bar'?5:13)) + 'px';
  carry.style.transition = 'none';
  document.body.appendChild(carry);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const dur = 380;
      carry.style.transition = `left ${dur}ms var(--spring), top ${dur}ms var(--spring), opacity ${dur}ms`;
      carry.style.left = (toRect.left + toRect.width/2  - (carryClass==='ten-bar'?16:13)) + 'px';
      carry.style.top  = (toRect.top  + toRect.height/2 - (carryClass==='ten-bar'?5:13))  + 'px';

      setTimeout(() => {
        carry.remove();
        // Settle the carried block in target bin
        const block = document.createElement('div');
        block.className = `${carryClass} block-settle`;
        toEl.appendChild(block);
        const badge = toEl.querySelector('.bin-count');
        if (badge) toEl.appendChild(badge);

        toEl.classList.add('accepting');
        setTimeout(()=>toEl.classList.remove('accepting'), 350);

        updateBinCounts();
        checkOverflows();
      }, dur);
    });
  });

  updateBinCounts();
  checkOverflows();
}

// ── Rebuild a bin's block DOM to match logical count ──
function rebuildBinDOM(binEl, binType) {
  const blockClass = binType==='ones' ? 'cube' : binType==='tens' ? 'ten-bar' : 'hundred-flat';
  const logCount   = binType==='ones' ? binOnes : binType==='tens' ? binTens : binHundreds;

  // Remove existing blocks (not the badge)
  binEl.querySelectorAll('.cube, .ten-bar, .hundred-flat').forEach(e=>e.remove());

  const showCount = Math.min(logCount, 30);
  for (let i=0; i<showCount; i++) {
    const block = document.createElement('div');
    block.className = blockClass;
    binEl.appendChild(block);
  }
  // Keep badge on top
  const badge = binEl.querySelector('.bin-count');
  if (badge) binEl.appendChild(badge);
}

function updateBinCounts() {
  const setCount = (id, n) => {
    const el = document.getElementById(id);
    el.textContent = n;
    el.classList.toggle('show', n > 0);
  };
  setCount('cntH', binHundreds);
  setCount('cntT', binTens);
  setCount('cntO', binOnes);
}

// ═══════════════════════════════════════════════════
// ALGORITHM  — only the top problem statement updates automatically.
// Partial products and total stay dark until (future phases) manually confirmed.
// ═══════════════════════════════════════════════════
const _prev = {};

function updateAlg(A, B) {
  _setFactor(A, 'aA_T','aA_O');
  _setFactor(B, 'aB_T','aB_O');
  // All partial products / total remain dim — no auto-populate
}

function _setFactor(f, tId, oId) {
  const tel = document.getElementById(tId);
  const oel = document.getElementById(oId);
  if (!tel||!oel) return;
  if (!f.total) { tel.textContent=''; oel.textContent=''; return; }
  if (f.T > 0) {
    _popAD(tId, f.T, 't');
    _popAD(oId, f.O, 'o');
  } else {
    tel.textContent = '';
    _popAD(oId, f.O, 'o');
  }
}

function _popAD(id, val, col) {
  const el = document.getElementById(id);
  if (!el) return;
  const s = val===''||val===null?'':String(val);
  if (_prev[id]===s) return;
  _prev[id]=s;
  el.textContent=s;
  el.className='ad '+col;
  if (s!=='') { el.classList.add('pop'); setTimeout(()=>el.classList.remove('pop'),400); }
}

// ═══════════════════════════════════════════════════
// BANKS
// ═══════════════════════════════════════════════════
function buildBanks() {
  const bT = document.getElementById('bankTop');
  const bR = document.getElementById('bankRight');
  bT.innerHTML=''; bR.innerHTML='';
  bT.appendChild(makeSrc('ten','h'));
  bT.appendChild(makeSrc('one','h'));
  bR.appendChild(makeSrc('ten','v'));
  bR.appendChild(makeSrc('one','v'));
}

function makeSrc(kind, axis) {
  const el = document.createElement('div');
  el.className = `src src-${kind}-${axis}`;
  el.draggable = true;
  el.title = kind==='ten'?'10':'1';
  el.addEventListener('dragstart', e => {
    e.dataTransfer.setData('kind', kind);
    e.dataTransfer.setData('axis', axis);
    e.dataTransfer.effectAllowed = 'copy';
  });
  el.addEventListener('click', () => {
    if (axis==='h') addTop(kind==='ten'?10:1);
    else            addRight(kind==='ten'?10:1);
  });
  return el;
}

// ═══════════════════════════════════════════════════
// BIN REGROUP CLICK HANDLERS  (Step 3)
// ═══════════════════════════════════════════════════
document.getElementById('binO').addEventListener('click', () => {
  if (binOnes >= 10) triggerRegroup(document.getElementById('binO'), 'ones');
});
document.getElementById('binT').addEventListener('click', () => {
  if (binTens >= 10) triggerRegroup(document.getElementById('binT'), 'tens');
});
document.getElementById('binH').addEventListener('click', () => {
  // hundreds can't carry further; nothing to do
});

// ═══════════════════════════════════════════════════
// RESET  (double-click canvas)
// ═══════════════════════════════════════════════════
document.getElementById('gCanvas').addEventListener('dblclick', e => {
  const tgt = e.target;
  const canvas = document.getElementById('gCanvas');
  const az     = document.getElementById('arrayZone');
  const svg    = document.getElementById('gridSVG');
  if (tgt===canvas||tgt===az||tgt===svg||tgt.tagName==='line') {
    topSegs=[]; rightSegs=[];
    sweepState='idle'; sweepX=0;
    binOnes=0; binTens=0; binHundreds=0;
    Object.keys(_prev).forEach(k=>delete _prev[k]);
    document.querySelectorAll('.squeegee,.sweep-fill,.harvest-fill,.quad-ghost,.block-fly,.carry-fly').forEach(e=>e.remove());
    // Clear all physical blocks from bins
    ['binO','binT','binH'].forEach(id => {
      document.getElementById(id).querySelectorAll('.cube,.ten-bar,.hundred-flat').forEach(e=>e.remove());
      document.getElementById(id).classList.remove('overflow','accepting');
    });
    document.getElementById('algLock').classList.remove('active');
    updateBinCounts();
    layout();
  }
});

// ═══════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════
document.getElementById('zoomSlider').addEventListener('input', e => {
  document.documentElement.style.setProperty('--zoom', e.target.value);
  buildBanks();
  layout();
});

// ═══════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════
buildBanks();
layout();
</script>
