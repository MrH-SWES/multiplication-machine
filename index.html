<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Multiplication Machine | Math Things.</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #F5F5F7;
      --glass:     rgba(245,245,247,0.92);
      --surface:   #FFFFFF;
      --text-main: #1D1D1F;
      --text-gray: #86868B;
      --text-light:#AEAEB2;
      --accent:    #007AFF;
      --border:    rgba(0,0,0,0.07);

      --spring: cubic-bezier(0.34,1.56,0.64,1);

      /* Colors */
      --hundreds: #2E7D32;
      --tens:     #4169E1;
      --ones:     #DC143C;

      /* Grid geometry */
      --zoom: 1;
      --cell: calc(36px * var(--zoom));
      --rail: calc(18px * var(--zoom));

      /* ── Physical block geometry (Phase 2) ── */
      --block-zoom: 1;
      --slot-w:    calc(18px * var(--block-zoom));
      --cube-base: calc(14px * var(--block-zoom));
      --depth:     calc(5px  * var(--block-zoom));

      /* Derived face colours with lighting */
      --ones-top:   #FF3B5C;
      --ones-side:  #8B0A1E;
      --ones-front: #DC143C;
      --tens-top:   #6682FF;
      --tens-side:  #1A2E99;
      --tens-front: #4169E1;
      --hund-top:   #4CAF50;
      --hund-side:  #1B5E20;
      --hund-front: #2E7D32;

      /* UI Shadows */
      --shadow-block: 
        inset 2px 2px 0 rgba(255,255,255,0.4),
        inset -2px -2px 0 rgba(0,0,0,0.12),
        0 8px 20px rgba(0,0,0,0.12),
        1px -1px 0 rgba(0,0,0,0.08);
    }

    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:'Lexend',sans-serif;
      background:var(--bg);
      color:var(--text-main);
      height:100dvh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      user-select:none;
      -webkit-user-select:none;
      -webkit-font-smoothing:antialiased;
    }

    /* ══════════════════════════════════════
       TOP LEVEL: bank-top + main-row + floor
    ══════════════════════════════════════ */
    .bank-top {
      height: 60px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      z-index: 10;
    }

    /* main row: canvas-side + alg-panel */
    .main-row {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ══════════════════════════════════════
       CANVAS SIDE
    ══════════════════════════════════════ */
    .canvas-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* grid-row: scroller + right bank */
    .grid-row {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .grid-scroller {
      flex: 1;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,.12) transparent;
      background: var(--bg);
      position: relative;
    }
    .grid-scroller::-webkit-scrollbar { width:6px; height:6px; }
    .grid-scroller::-webkit-scrollbar-thumb { background:rgba(0,0,0,.12); border-radius:3px; }

    /* Right bank */
    .bank-right {
      width: 60px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--surface);
      border-left: 1.5px solid var(--border);
    }

    /* ── Canvas (sized by JS) ── */
    #gCanvas {
      position: relative;
    }

    #topRail {
      position: absolute;
      display: flex;
      align-items: flex-end;
    }
    #rightRail {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    #arrayZone {
      position: absolute;
    }
    #gridSVG {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }

    /* ── SOURCE BLOCKS ── */
    .src {
      cursor: grab;
      border-radius: 5px;
      box-shadow: var(--shadow-block);
      flex-shrink: 0;
      transition: transform .15s var(--spring);
    }
    .src:hover  { transform: translateY(-2px) scale(1.06); }
    .src:active { transform: scale(.92); cursor: grabbing; }

    .src-ten-h { width:calc(var(--cell)*10); height:var(--rail); background:var(--tens); border-radius:4px; }
    .src-one-h { width:var(--cell);          height:var(--rail); background:var(--ones); border-radius:4px; }
    .src-ten-v { width:var(--rail); height:calc(var(--cell)*10); background:var(--tens); border-radius:4px; }
    .src-one-v { width:var(--rail); height:var(--cell);          background:var(--ones); border-radius:4px; }

    /* ── PLACED RAIL BLOCKS ── */
    .rb { flex-shrink:0; border-radius:4px; box-shadow:var(--shadow-block); }
    .rb.tens { background:var(--tens); }
    .rb.ones { background:var(--ones); }

    .rail-rest {
      flex:1; min-width:4px; min-height:4px;
      border:2px dashed rgba(0,0,0,.1); border-radius:5px;
      transition:border-color .15s, background .15s;
    }
    .rail-rest.over { border-color:var(--accent); background:rgba(0,122,255,.05); }

    /* ══════════════════════════════════════
       SQUEEGEE
    ══════════════════════════════════════ */
    .squeegee {
      position: absolute;
      width: 10px;
      border-radius: 5px;
      cursor: grab;
      z-index: 30;
      box-shadow: 0 2px 8px rgba(0,0,0,.3), inset 1px 0 0 rgba(255,255,255,.4);
      transition: box-shadow .15s, opacity .2s;
      touch-action: none;
    }
    .squeegee:active { cursor: grabbing; }
    .squeegee.sq-ones { background: var(--ones); }
    .squeegee.sq-tens { background: var(--tens); }

    .squeegee.locked {
      opacity: .35;
      cursor: not-allowed;
      pointer-events: none;
    }
    .squeegee.pulsing {
      animation: sqPulse 1.4s ease-in-out infinite;
    }
    @keyframes sqPulse {
      0%,100% { box-shadow: 0 2px 8px rgba(0,0,0,.3), inset 1px 0 0 rgba(255,255,255,.4); }
      50%     { box-shadow: 0 2px 8px rgba(0,0,0,.3), inset 1px 0 0 rgba(255,255,255,.4),
                            0 0 0 5px rgba(220,20,60,.25); }
    }

    /* ══════════════════════════════════════
       QUADRANT fills & ghost labels
    ══════════════════════════════════════ */
    .sweep-fill {
      position: absolute;
      pointer-events: none;
    }
    .sweep-fill.oo { }
    .sweep-fill.to { }

    .quad-ghost {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      letter-spacing: -0.04em;
      pointer-events: none;
      border-radius: 3px;
    }
    .quad-ghost.oo { background: rgba(220,20,60,.07);  color: rgba(220,20,60,.55); }
    .quad-ghost.to { background: rgba(65,105,225,.07); color: rgba(65,105,225,.55); }

    .harvest-fill {
      position: absolute;
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      letter-spacing: -0.04em;
      animation: harvestPulse 1.2s ease-in-out infinite;
    }
    .harvest-fill.oo { background: rgba(220,20,60,.22); color: rgba(220,20,60,.7); }
    .harvest-fill.to { background: rgba(65,105,225,.22); color: rgba(65,105,225,.7); }
    @keyframes harvestPulse {
      0%,100% { opacity: 1; }
      50%     { opacity: .7; }
    }

    /* ══════════════════════════════════════
       DASHBOARD FLOOR
    ══════════════════════════════════════ */
    .dashboard-floor {
      height: 160px;
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 0 28px;
    }

    .bin-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .bin-label {
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-light);
    }
    .bin {
      min-width: 120px;
      max-width: 260px;
      height: 100px;
      border-radius: 16px;
      border: 2.5px dashed rgba(0,0,0,.12);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 10px;
      transition: border-color .2s, background .2s, transform .15s var(--spring);
      position: relative;
      perspective: 400px;
      perspective-origin: 50% 20%;
    }
    .bin.hundreds-bin { border-color: rgba(46,125,50,.35); }
    .bin.tens-bin     { border-color: rgba(65,105,225,.35); }
    .bin.ones-bin     { border-color: rgba(220,20,60,.35); }

    .bin.accepting {
      border-style: solid;
      transform: scale(1.035);
    }
    .bin.hundreds-bin.accepting { border-color:var(--hundreds); background:rgba(46,125,50,.05); }
    .bin.tens-bin.accepting     { border-color:var(--tens);     background:rgba(65,105,225,.05); }
    .bin.ones-bin.accepting     { border-color:var(--ones);     background:rgba(220,20,60,.05); }

    /* ══════════════════════════════════════
       PHYSICAL BLOCKS — 3-D Isometric
    ══════════════════════════════════════ */
    .cube, .ten-bar, .hundred-flat {
      flex-shrink: 0;
      position: relative;
      display: inline-flex;
      transform: rotateX(10deg);
      transform-style: preserve-3d;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,.28));
      cursor: grab;
      box-shadow: var(--shadow-block);
    }

    /* CUBE (ones unit — red) */
    .cube {
        width: var(--cube-base); height: var(--cube-base); border-radius: calc(6px * var(--block-zoom));
        background: var(--ones-front); transform: rotateX(10deg); box-shadow: var(--shadow-block); position: relative; flex-shrink: 0;
    }
    .cube::after {
        content: '1'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-weight: 800; color: rgba(255,255,255,0.6); font-size: calc(18px * var(--block-zoom)); pointer-events: none;
    }

    /* TEN-BAR (tens unit — blue) */
    .ten-bar {
        width: calc(var(--slot-w) * 10 - var(--depth)); height: var(--cube-base); border-radius: calc(6px * var(--block-zoom));
        background: var(--tens-front); transform: rotateX(10deg); display: flex; box-shadow: var(--shadow-block); position: relative; flex-shrink: 0;
    }
    .ten-seg {
      flex: 1;
      height: 100%;
      background: var(--tens-front);
      border-radius: 2px;
      position: relative;
      box-shadow: 0 0 0 1px rgba(255,255,255,.12) inset;
    }
    .ten-seg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--tens-top);
      border-radius: 2px 2px 0 0;
      transform: rotateX(-80deg) scaleY(0.45) translateY(-100%);
      transform-origin: top center;
    }
    .ten-bar::after {
        content: '10'; 
        position: absolute; inset: 0; 
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; color: rgba(255,255,255,0.6); 
        font-size: calc(14px * var(--block-zoom)); pointer-events: none; z-index: 5;
    }

    /* HUNDRED-FLAT (hundreds — green) */
    .hundred-flat {
      width:  calc(var(--cube-base) * 10 + var(--depth) * 0.05);
      height: calc(var(--cube-base) * 10 + var(--depth) * 0.05);
      background: transparent;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows:    repeat(10, 1fr);
      gap: 1px;
      border-radius: calc(6px * var(--block-zoom));
      filter: drop-shadow(calc(var(--depth)*0.5) calc(var(--depth)*-0.5) 0 var(--hund-side))
              drop-shadow(0 4px 10px rgba(0,0,0,.3));
    }
    .hund-seg {
      background: var(--hund-front);
      border-radius: 1px;
      position: relative;
      box-shadow: 0 0 0 1px rgba(255,255,255,.1) inset;
    }
    .hund-seg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--hund-top);
      border-radius: 1px 1px 0 0;
      transform: rotateX(-80deg) scaleY(0.45) translateY(-100%);
      transform-origin: top center;
    }
    .hundred-flat::after {
        content: '100'; 
        position: absolute; inset: 0; 
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; color: rgba(255,255,255,0.6); 
        font-size: calc(32px * var(--block-zoom)); pointer-events: none; z-index: 5;
    }

    /* ── Flying block (fixed, animates to bin) ── */
    .block-fly {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      transform: rotateX(10deg);
    }
    .block-fly.cube {
      width: var(--cube-base);
      height: var(--cube-base);
      background: var(--ones-front);
      border-radius: 2px;
      box-shadow: calc(var(--depth)*0.7) calc(var(--depth)*-0.7) 0 0 var(--ones-side),
                  0 4px 10px rgba(0,0,0,.35);
    }
    .block-fly.ten-bar {
      width: calc(var(--cube-base) * 10);
      height: var(--cube-base);
      background: var(--tens-front);
      border-radius: 3px;
      box-shadow: calc(var(--depth)*0.7) calc(var(--depth)*-0.7) 0 0 var(--tens-side),
                  0 4px 10px rgba(0,0,0,.35);
    }
    .block-fly.hundred-flat {
      width: calc(var(--cube-base) * 10);
      height: calc(var(--cube-base) * 10);
      background: var(--hund-front);
      border-radius: 3px;
      box-shadow: calc(var(--depth)*0.7) calc(var(--depth)*-0.7) 0 0 var(--hund-side),
                  0 4px 10px rgba(0,0,0,.35);
    }

    /* ── Settle pop-in ── */
    .block-settle {
      animation: blockSettle .3s var(--spring) both;
    }
    @keyframes blockSettle {
      0%   { transform: rotateX(10deg) scale(0.35) translateY(8px); opacity: 0; }
      100% { transform: rotateX(10deg) scale(1)    translateY(0);   opacity: 1; }
    }

    /* ── Carry fly (regroup) ── */
    .carry-fly {
      position: fixed;
      pointer-events: none;
      z-index: 250;
      transform: rotateX(10deg);
      border-radius: 3px;
    }
    .carry-fly.ten-bar {
      width: calc(var(--cube-base) * 10);
      height: var(--cube-base);
      background: var(--tens-front);
      box-shadow: calc(var(--depth)*0.7) calc(var(--depth)*-0.7) 0 0 var(--tens-side),
                  0 6px 18px rgba(0,0,0,.4);
    }
    .carry-fly.hundred-flat {
      width: calc(var(--cube-base) * 10);
      height: calc(var(--cube-base) * 10);
      background: var(--hund-front);
      box-shadow: calc(var(--depth)*0.7) calc(var(--depth)*-0.7) 0 0 var(--hund-side),
                  0 6px 18px rgba(0,0,0,.4);
    }

    /* ── OVERFLOW STATE ── */
    .bin.overflow {
      border-style: solid !important;
      animation: overflowPulse 0.9s ease-in-out infinite;
      cursor: pointer;
    }
    @keyframes overflowPulse {
      0%,100% { border-color: #FF9500; box-shadow: 0 0 0 0 rgba(255,149,0,0); }
      45%     { border-color: #FF3B30; box-shadow: 0 0 0 8px rgba(255,59,48,.22); }
    }
    .bin.overflow::after {
      content: 'CLICK TO REGROUP';
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: .43rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #FF3B30;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── ALG PANEL LOCK OVERLAY ── */
    .alg-panel {
      position: relative;
    }
    .alg-lock-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(245,245,247,0.76);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 40;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
    }
    .alg-lock-overlay.active { display: flex; }
    .alg-lock-icon { font-size: 2rem; }
    .alg-lock-msg {
      font-size: .58rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #FF3B30;
      text-align: center;
      padding: 0 16px;
      line-height: 1.6;
    }

    .bin-count {
      position: absolute;
      bottom: -6px; right: -6px;
      background: var(--text-main);
      color: white;
      font-size: .6rem;
      font-weight: 800;
      border-radius: 99px;
      padding: 1px 6px;
      min-width: 20px;
      text-align: center;
      opacity: 0;
      transition: opacity .2s;
    }
    .bin-count.show { opacity: 1; }
    .bin-divider { width: 1px; height: 50px; background: var(--border); align-self: center; }

    /* ══════════════════════════════════════
       ALGORITHM PANEL
    ══════════════════════════════════════ */
    .alg-panel {
      width: 200px;
      flex-shrink: 0;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding: 32px 20px 24px;
      overflow-y: auto;
    }

    .alg-problem { width: 100%; display: flex; flex-direction: column; align-items: flex-end; gap: 1px; margin-bottom: 4px; }
    .alg-row { display:flex; align-items:baseline; gap:0; }
    .alg-sym { font-size:1.9rem; font-weight:900; color:var(--text-light); line-height:42px; margin-right:2px; }
    .ad { width:30px; height:42px; text-align:center; line-height:42px; font-size:2.3rem; font-weight:800; letter-spacing:-0.04em; border-radius:8px; }
    .ad.t   { color:var(--tens); }
    .ad.o   { color:var(--ones); }
    .ad.pop { animation:dPop .35s var(--spring) both; }
    @keyframes dPop { 0% { transform:scale(.5) translateY(8px); opacity:0; } 100% { transform:scale(1)  translateY(0);   opacity:1; } }
    .alg-line { height:2.5px; background:var(--text-main); width:100%; border-radius:2px; margin:5px 0 4px; }

    .pp-section { width:100%; display:flex; flex-direction:column; gap:1px; margin-bottom:4px; }
    .pp-row { display:flex; align-items:baseline; justify-content:flex-end; gap:0; opacity:.12; transition:opacity .4s; }
    .pp-row.lit { opacity:1; }
    .pd { width:30px; height:42px; text-align:center; line-height:42px; font-size:2.3rem; font-weight:800; letter-spacing:-0.04em; color:var(--text-main); border-radius:8px; }
    .pd.zero { color:var(--text-light); }
    .pd.pop  { animation:dPop .35s var(--spring) both; }

    .sum-line { height:2.5px; background:var(--text-main); width:100%; border-radius:2px; margin:4px 0; opacity:.12; transition:opacity .4s; }
    .sum-line.lit { opacity:1; }
    .total-row { display:flex; align-items:baseline; justify-content:flex-end; gap:0; opacity:.12; transition:opacity .4s; margin-bottom:20px; }
    .total-row.lit { opacity:1; }
    .td { width:30px; height:50px; text-align:center; line-height:50px; font-size:2.8rem; font-weight:900; letter-spacing:-0.04em; color:var(--text-main); border-radius:8px; }
    .td.pop { animation:dPop .5s var(--spring) both; }

    .dist-grid { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:5px; opacity:0; transition:opacity .5s; }
    .dist-grid.show { opacity:1; }
    .dc { border-radius:10px; padding:7px 5px; display:flex; flex-direction:column; align-items:center; gap:2px; }
    .dc.tt { background:rgba(46,125,50,.1); }
    .dc.ot,.dc.to { background:rgba(65,105,225,.1); }
    .dc.oo { background:rgba(220,20,60,.1); }
    .dc-val { font-size:1rem; font-weight:800; letter-spacing:-0.04em; }
    .dc.tt .dc-val { color:var(--hundreds); }
    .dc.ot .dc-val,.dc.to .dc-val { color:var(--tens); }
    .dc.oo .dc-val { color:var(--ones); }
    .dc-eq { font-size:.58rem; font-weight:600; color:var(--text-gray); }

    .watermark { position:fixed; bottom:8px; left:12px; font-weight:900; font-size:.8rem; letter-spacing:-0.05em; color:var(--text-light); pointer-events:none; z-index:5; }
    .wbead { width:.2em; height:.2em; border-radius:50%; display:inline-block; margin-left:.04em; margin-bottom:.07em; background:linear-gradient(135deg,#e0e0e0,#a0a0a0,#d0d0d0); box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .zoom-pill { position:fixed; bottom:8px; right:212px; display:flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--border); border-radius:99px; padding:4px 12px; box-shadow:0 2px 8px rgba(0,0,0,.07); z-index:50; }
    .zoom-pill svg { color:var(--text-light); }
    .zoom-slider { width:72px; cursor:pointer; accent-color:var(--accent); }
  </style>
</head>
<body>

<div class="bank-top" id="bankTop"></div>
<div class="main-row">
  <div class="canvas-side">
    <div class="grid-row">
      <div class="grid-scroller" id="gridScroller">
        <div id="gCanvas">
          <div id="topRail"></div>
          <div id="rightRail"></div>
          <div id="arrayZone">
            <svg id="gridSVG"></svg>
          </div>

    <div class="dashboard-floor">
      <div class="bin-group">
        <div class="bin-label">Hundreds</div>
        <div class="bin hundreds-bin" id="binH"><span class="bin-count" id="cntH">0</span></div>
      </div>
      <div class="bin-divider"></div>
      <div class="bin-group">
        <div class="bin-label">Tens</div>
        <div class="bin tens-bin" id="binT"><span class="bin-count" id="cntT">0</span></div>

      <div class="bin-divider"></div>
      <div class="bin-group">
        <div class="bin-label">Ones</div>

  <div class="alg-panel">

      <div class="pp-row" id="pp1">
        <div class="pd" id="p1_TH"></div>
        <div class="pd" id="p1_H"></div>
        <div class="pd" id="p1_T"></div>
        <div class="pd" id="p1_O"></div>

        <div class="pd" id="p2_TH"></div>
        <div class="pd" id="p2_H"></div>

      <div class="td" id="t_TH"></div>

      <div class="dc tt"><div class="dc-val" id="dm_tt"></div><div class="dc-eq" id="dm_tt_eq"></div></div>
      <div class="dc ot"><div class="dc-val" id="dm_ot"></div><div class="dc-eq" id="dm_ot_eq"></div></div>
      <div class="dc to"><div class="dc-val" id="dm_to"></div><div class="dc-eq" id="dm_to_eq"></div></div>
      <div class="dc oo"><div class="dc-val" id="dm_oo"></div><div class="dc-eq" id="dm_oo_eq"></div></div>
    </div>

</div>

<div class="watermark">Math Things<span class="wbead"></span></div>
<div class="zoom-pill">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input type="range" id="zoomSlider" class="zoom-slider" min="0.35" max="2" step="0.05" value="1">
</div>

<script>
'use strict';

function cp() { return 36 * parseFloat(document.documentElement.style.getPropertyValue('--zoom') || 1); }
function rp() { return cp() * 0.5; }
const GAP = 8; 

let topSegs   = [];
let rightSegs = [];

function totalTop()   { return topSegs.reduce((s,x)=>s+x,0); }
function totalRight() { return rightSegs.reduce((s,x)=>s+x,0); }

function factorA() {
  const u=totalTop();
  return { total:u, tens:Math.floor(u/10)*10, ones:u%10, T:Math.floor(u/10), O:u%10 };
}
function factorB() {
  const u=totalRight();
  return { total:u, tens:Math.floor(u/10)*10, ones:u%10, T:Math.floor(u/10), O:u%10 };
}

let sweepState = 'idle';
let sweepX     = 0;

let binOnes     = 0;
let binTens     = 0;
let binHundreds = 0;

function triggerAutoZoom() {
  const A = factorA(), B = factorB();
  if (!A.total && !B.total) return;

  const algPanelW   = 200;
  const bankTopH    = 60;
  const bankRightW  = 60;
  const dashFloorH  = 160;
  const scrollbarM  = 16;

  const availW = window.innerWidth  - algPanelW - bankRightW - scrollbarM - 48;
  const availH = window.innerHeight - bankTopH  - dashFloorH - scrollbarM - 48;

  const CELL_BASE = 36, RAIL_BASE = 18;
  const canvasNatW = Math.max(1, A.total) * CELL_BASE + RAIL_BASE + GAP + 32;
  const canvasNatH = Math.max(1, B.total) * CELL_BASE + RAIL_BASE + 32;

  const scaleW = availW / canvasNatW;
  const scaleH = availH / canvasNatH;
  const newZoom = Math.min(scaleW, scaleH, 2.0); 
  const clamped = Math.max(0.35, +newZoom.toFixed(2));

  document.documentElement.style.setProperty('--zoom', clamped);
  document.documentElement.style.setProperty('--block-zoom', Math.min(clamped * 0.85, 1.4));

  const slider = document.getElementById('zoomSlider');
  if (slider) slider.value = clamped;
}

function layout() {
  const C = cp(), R = rp();
  const A = factorA(), B = factorB();
  const W = A.total * C;
  const H = B.total * C;

  const canvasW = W + GAP + R + 32;
  const canvasH = R + H + 32;

  const canvas = document.getElementById('gCanvas');
  canvas.style.width  = canvasW + 'px';
  canvas.style.height = canvasH + 'px';

  const topRail = document.getElementById('topRail');
  topRail.style.top    = '0';
  topRail.style.left   = '0';
  topRail.style.height = R + 'px';
  topRail.style.width  = (W || 60) + 'px';

  const arrayLeft = 0;
  const arrayTop  = R;
  const az = document.getElementById('arrayZone');
  az.style.left   = arrayLeft + 'px';
  az.style.top    = arrayTop  + 'px';
  az.style.width  = W + 'px';
  az.style.height = H + 'px';

  const svg = document.getElementById('gridSVG');
  svg.style.width  = W + 'px';
  svg.style.height = H + 'px';
  svg.setAttribute('width',  W || 0);
  svg.setAttribute('height', H || 0);

  const rightRail = document.getElementById('rightRail');
  rightRail.style.top   = arrayTop + 'px';
  rightRail.style.left  = (W + GAP) + 'px';
  rightRail.style.width = R + 'px';
  rightRail.style.height= (H || 60) + 'px';

  drawGrid(C, A, B);
  renderTopRail(C, R, A);
  renderRightRail(C, R, B);
  updateAlg(A, B);
  placeSqueegee(C, R, A, B);
  renderSweepFill(C, A, B);
}

function drawGrid(C, A, B) {
  const svg = document.getElementById('gridSVG');
  svg.innerHTML = '';
  if (!A.total || !B.total) return;
  const W = A.total*C, H = B.total*C;

  const ln = (x1,y1,x2,y2,col,w,dash='') => {
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1);
    l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke',col); l.setAttribute('stroke-width',w);
    if (dash) l.setAttribute('stroke-dasharray',dash);
    svg.appendChild(l);
  };

  for (let x=0; x<=A.total; x++) {
    const maj = x===0 || x===A.total || (A.ones>0 && x===A.tens);
    ln(x*C,0,x*C,H, maj?'rgba(0,0,0,.22)':'rgba(0,0,0,.07)', maj?1.5:.5);
  }
  for (let y=0; y<=B.total; y++) {
    const maj = y===0 || y===B.total || (B.ones>0 && y===B.tens);
    ln(0,y*C,W,y*C, maj?'rgba(0,0,0,.22)':'rgba(0,0,0,.07)', maj?1.5:.5);
  }

  if (A.T>0 && A.O>0) ln(A.tens*C,0,A.tens*C,H,'rgba(0,0,0,.32)',2,'7 4');
  if (B.T>0 && B.O>0) ln(0,B.tens*C,W,B.tens*C,'rgba(0,0,0,.32)',2,'7 4');
}

function dropHandler(axis) {
  return {
    over:  e => {
      e.preventDefault();
      const rest = e.currentTarget.querySelector('.rail-rest');
      if (rest) rest.classList.add('over');
    },
    leave: e => {
      const rest = e.currentTarget.querySelector('.rail-rest');
      if (rest) rest.classList.remove('over');
    },
    drop:  e => {
      e.preventDefault();
      const rest = e.currentTarget.querySelector('.rail-rest');
      if (rest) rest.classList.remove('over');
      const kind = e.dataTransfer.getData('kind');
      const ax   = e.dataTransfer.getData('axis');
      if (ax !== axis) return;
      if (axis==='h') addTop(kind==='ten'?10:1);
      else            addRight(kind==='ten'?10:1);
    }
  };
}

function renderTopRail(C, R, A) {
  const rail = document.getElementById('topRail');
  if (rail._dhOver)  { rail.removeEventListener('dragover',  rail._dhOver);  rail._dhOver  = null; }
  if (rail._dhLeave) { rail.removeEventListener('dragleave', rail._dhLeave); rail._dhLeave = null; }
  if (rail._dhDrop)  { rail.removeEventListener('drop',      rail._dhDrop);  rail._dhDrop  = null; }
  rail.innerHTML = '';
  topSegs.forEach(s => {
    const el = document.createElement('div');
    el.className = 'rb ' + (s===10?'tens':'ones');
    el.style.height = R+'px';
    el.style.width  = (s===10 ? C*10 : C)+'px';
    el.style.borderRadius = '3px';
    rail.appendChild(el);
  });
  if (A.total < 99) {
    const dz = document.createElement('div');
    dz.className = 'rail-rest';
    dz.style.height = R+'px';
    rail.appendChild(dz);
    const dh = dropHandler('h');
    rail._dhOver  = dh.over;
    rail._dhLeave = dh.leave;
    rail._dhDrop  = dh.drop;
    rail.addEventListener('dragover',  rail._dhOver);
    rail.addEventListener('dragleave', rail._dhLeave);
    rail.addEventListener('drop',      rail._dhDrop);
  }
}

function renderRightRail(C, R, B) {
  const rail = document.getElementById('rightRail');
  if (rail._dhOver)  { rail.removeEventListener('dragover',  rail._dhOver);  rail._dhOver  = null; }
  if (rail._dhLeave) { rail.removeEventListener('dragleave', rail._dhLeave); rail._dhLeave = null; }
  if (rail._dhDrop)  { rail.removeEventListener('drop',      rail._dhDrop);  rail._dhDrop  = null; }
  rail.innerHTML = '';
  rightSegs.forEach(s => {
    const el = document.createElement('div');
    el.className = 'rb ' + (s===10?'tens':'ones');
    el.style.width  = R+'px';
    el.style.height = (s===10 ? C*10 : C)+'px';
    el.style.borderRadius = '3px';
    rail.appendChild(el);
  });
  if (B.total < 99) {
    const dz = document.createElement('div');
    dz.className = 'rail-rest';
    dz.style.width = R+'px';
    rail.appendChild(dz);
    const dh = dropHandler('v');
    rail._dhOver  = dh.over;
    rail._dhLeave = dh.leave;
    rail._dhDrop  = dh.drop;
    rail.addEventListener('dragover',  rail._dhOver);
    rail.addEventListener('dragleave', rail._dhLeave);
    rail.addEventListener('drop',      rail._dhDrop);
  }
}

function addTop(units) {
  if (totalTop() + units > 99) return;
  topSegs.push(units);
  topSegs.sort((a, b) => b - a);
  resetSweep();
  triggerAutoZoom();
  layout();
}
function addRight(units) {
  if (totalRight() + units > 99) return;
  rightSegs.push(units);
  rightSegs.sort((a, b) => b - a);
  resetSweep();
  triggerAutoZoom();
  layout();
}
function resetSweep() {
  sweepState = 'idle';
  sweepX = 0;
  document.querySelectorAll('.squeegee').forEach(e=>e.remove());
  document.querySelectorAll('.sweep-fill,.harvest-fill,.quad-ghost').forEach(e=>e.remove());
}

function placeSqueegee(C, R, A, B) {
  if (!A.total || !B.total) return;

  if (sweepState === 'idle') {
    sweepState = 'ready';
    sweepX = A.total * C; 
  }

  // --- BUG 1 FIX: Zero-Value Squeegee Logic ---
  if (B.O === 0) {
    const sq = document.getElementById('sq-ones');
    if (sq) sq.style.display = 'none';
    if (sweepState === 'ready' || sweepState === 'idle') {
        sweepState = 'done'; // Skip ones sweep entirely, proceed to tens (Phase 3)
    }
    return;
  }

  const sqHeight = B.O * C;
  const sqTop    = R + (B.tens * C); 

  let sq = document.getElementById('sq-ones');
  if (!sq) {
    sq = document.createElement('div');
    sq.id = 'sq-ones';
    sq.className = 'squeegee sq-ones';
    document.getElementById('gCanvas').appendChild(sq);
    initSqueegeDrag(sq);
  }

  sq.style.top    = sqTop + 'px';
  sq.style.height = sqHeight + 'px';
  sq.style.width  = '10px';
  sq.style.display = 'block';

  const sqLeft = 0 + sweepX - 5; 
  sq.style.left = sqLeft + 'px';

  const locked = (sweepState === 'stopped-oo');
  sq.classList.toggle('locked', locked);
  sq.classList.toggle('pulsing',
    sweepState === 'ready' || sweepState === 'harvested-oo'
  );
}

function initSqueegeDrag(sq) {
  let dragging = false;
  let startClientX, startSweepX;

  const onStart = (clientX) => {
    const A = factorA();
    if (!A.total) return;
    if (sweepState === 'stopped-oo') return; 

    dragging = true;
    startClientX = clientX;
    startSweepX  = sweepX;
    sq.classList.remove('pulsing');
    sq.style.cursor = 'grabbing';
  };

  const onMove = (clientX) => {
    if (!dragging) return;
    const C  = cp();
    const A  = factorA();
    const B  = factorB();
    const dx = clientX - startClientX;

    let newX = startSweepX + dx;

    if (sweepState === 'ready' || sweepState === 'sweeping-oo') {
      newX = Math.min(A.total * C, newX);
      const stopX = A.T > 0 ? A.tens * C : 0;
      if (newX <= stopX) {
        newX = stopX;
        sweepState = 'stopped-oo';
        showHarvestFill(C, A, B);
      } else {
        sweepState = 'sweeping-oo';
      }
    } else if (sweepState === 'harvested-oo' || sweepState === 'sweeping-to') {
      newX = Math.min(A.tens * C, newX);
      newX = Math.max(0, newX);
      if (newX === 0) {
        sweepState = 'stopped-to';
        showHarvestFill(C, A, B);
      } else {
        sweepState = 'sweeping-to';
      }
    }

    sweepX = newX;
    renderSweepFill(C, A, B);
    updateSqPosition();
  };

  const onEnd = () => {
    if (!dragging) return;
    dragging = false;
    sq.style.cursor = '';
    const A = factorA();
    const B = factorB();
    const C = cp();
    if (sweepState !== 'stopped-oo' && sweepState !== 'stopped-to') {
      sq.classList.add('pulsing');
    }
    renderSweepFill(C, A, B);
    updateSqPosition();
  };

  sq.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX); });
  document.addEventListener('mousemove', e => onMove(e.clientX));
  document.addEventListener('mouseup', onEnd);
  sq.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientX); }, {passive:false});
  document.addEventListener('touchmove', e => { if(dragging) { e.preventDefault(); onMove(e.touches[0].clientX); } }, {passive:false});
  document.addEventListener('touchend', onEnd);
}

function updateSqPosition() {
  const sq = document.getElementById('sq-ones');
  if (!sq) return;
  sq.style.left = (sweepX - 5) + 'px';
}

function renderSweepFill(C, A, B) {
  document.querySelectorAll('.sweep-fill').forEach(e=>e.remove());

  if (!A.total || !B.total) return;
  if (sweepState==='idle'||sweepState==='ready') return;
  if (sweepState==='stopped-oo'||sweepState==='stopped-to') return; 
  if (sweepState==='done') return;

  const az = document.getElementById('arrayZone');

  const makeBlockWrapper = (cls, left, top, w, h, blockType, count) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'sweep-fill ' + cls;
    wrapper.style.left     = left + 'px';
    wrapper.style.top      = top  + 'px';
    wrapper.style.width    = w + 'px';
    wrapper.style.height   = h + 'px';
    wrapper.style.overflow = 'hidden';
    wrapper.style.display  = 'flex';
    wrapper.style.flexWrap = 'wrap';
    wrapper.style.gap      = '0';
    wrapper.style.alignItems     = 'flex-start';
    wrapper.style.justifyContent = 'flex-start';
    wrapper.style.background     = 'none';
    for (let i = 0; i < count; i++) {
      wrapper.appendChild(makeBlockEl(blockType));
    }
    return wrapper;
  };

  if (sweepState==='sweeping-oo' || sweepState==='harvested-oo') {
    const fillLeft  = sweepX;
    const fillRight = A.total * C;
    const fillW     = fillRight - fillLeft;
    const fillTop   = B.tens * C;
    const fillH     = B.ones * C; 
    if (fillW > 0 && fillH > 0) {
      az.appendChild(makeBlockWrapper('oo', fillLeft, fillTop, fillW, fillH, 'cube', A.ones * B.ones));
    }
  }

  if (sweepState==='sweeping-to') {
    const fillLeft  = sweepX;
    const fillRight = A.tens * C;
    const fillW     = fillRight - fillLeft;
    const fillTop   = B.tens * C;
    const fillH     = B.ones * C;
    if (fillW > 0 && fillH > 0) {
      az.appendChild(makeBlockWrapper('to', fillLeft, fillTop, fillW, fillH, 'ten-bar', A.T * B.ones));
    }
  }
}

function showHarvestFill(C, A, B) {
  document.querySelectorAll('.harvest-fill').forEach(e=>e.remove());
  const az = document.getElementById('arrayZone');

  if (sweepState === 'stopped-oo') {
    const x = A.tens * C;
    const y = B.tens * C;
    const w = A.ones * C;
    const h = B.ones * C;
    const val = A.ones * B.ones;
    if (w > 0 && h > 0) {
      const hf = makeHarvestFill('oo', x, y, w, h, val, C);
      az.appendChild(hf);
      hf.addEventListener('click', () => harvestQuadrant('oo', val, A, B, C));
    }
  } else if (sweepState === 'stopped-to') {
    const x = 0;
    const y = B.tens * C;
    const w = A.tens * C;
    const h = B.ones * C;
    const val = A.tens * B.ones;
    if (w > 0 && h > 0) {
      const hf = makeHarvestFill('to', x, y, w, h, val, C);
      az.appendChild(hf);
      hf.addEventListener('click', () => harvestQuadrant('to', val, A, B, C));
    }
  }
}

function makeHarvestFill(cls, x, y, w, h, val, C) {
  const el = document.createElement('div');
  el.className = 'harvest-fill ' + cls;
  el.style.left   = x + 'px';
  el.style.top    = y + 'px';
  el.style.width  = w + 'px';
  el.style.height = h + 'px';
  el.style.overflow      = 'hidden';
  el.style.display       = 'flex';
  el.style.flexWrap      = 'wrap';
  el.style.gap           = '0';
  el.style.alignItems    = 'flex-start';
  el.style.justifyContent = 'flex-start';
  el.style.background    = 'none';
  const blockType  = cls === 'oo' ? 'cube' : 'ten-bar';
  const blockCount = cls === 'oo' ? val : Math.floor(val / 10);
  for (let i = 0; i < blockCount; i++) {
    el.appendChild(makeBlockEl(blockType));
  }
  return el;
}

function harvestQuadrant(cls, val, A, B, C) {
  document.querySelectorAll('.harvest-fill').forEach(e=>e.remove());

  const az = document.getElementById('arrayZone');
  const azRect = az.getBoundingClientRect();

  let qx,qy,qw,qh;
  if (cls === 'oo') {
    qx = A.tens*C; qy = B.tens*C;
    qw = A.ones*C; qh = B.ones*C;
  } else {
    qx = 0; qy = B.tens*C;
    qw = A.tens*C; qh = B.ones*C;
  }

  const originX = azRect.left + qx + qw/2;
  const originY = azRect.top  + qy + qh/2;

  const ghost = document.createElement('div');
  ghost.className = 'quad-ghost ' + cls;
  ghost.style.left      = qx+'px'; ghost.style.top    = qy+'px';
  ghost.style.width     = qw+'px'; ghost.style.height = qh+'px';
  ghost.style.fontSize  = Math.min(C*0.85,44)+'px';
  ghost.textContent     = val;
  az.appendChild(ghost);

  const blockType = (cls === 'oo') ? 'cube' : 'ten-bar';
  const binType   = (cls === 'oo') ? 'ones' : 'tens';

  spawnBlocks(blockType, val, binType, originX, originY);

  if (cls === 'oo') {
    sweepState = 'harvested-oo';
    const sq = document.getElementById('sq-ones');
    if (sq) { sq.classList.remove('locked'); sq.classList.add('pulsing'); }
    if (A.T === 0) {
      sweepState = 'done';
      if (sq) sq.classList.remove('pulsing');
    }
  } else if (cls === 'to') {
    sweepState = 'done';
    const sq = document.getElementById('sq-ones');
    if (sq) { sq.classList.remove('pulsing','locked'); sq.style.opacity='.25'; sq.style.pointerEvents='none'; }
  }

  renderSweepFill(C, A, B);
}

function makeBlockEl(type) {
  const el = document.createElement('div');
  el.className = type;
  if (type === 'ten-bar') {
    for (let s = 0; s < 10; s++) {
      const seg = document.createElement('div');
      seg.className = 'ten-seg';
      el.appendChild(seg);
    }
  } else if (type === 'hundred-flat') {
    for (let s = 0; s < 100; s++) {
      const seg = document.createElement('div');
      seg.className = 'hund-seg';
      el.appendChild(seg);
    }
  }
  return el;
}

function getBlockSize(type) {
  const style = getComputedStyle(document.documentElement);
  const cubeBase = parseFloat(style.getPropertyValue('--cube-base')) || 14;
  if (type === 'cube')         return { w: cubeBase,      h: cubeBase };
  if (type === 'ten-bar')      return { w: cubeBase * 10, h: cubeBase };
  if (type === 'hundred-flat') return { w: cubeBase * 10, h: cubeBase * 10 };
  return { w: 14, h: 14 };
}

function spawnBlocks(type, count, binType, originX, originY) {
  const binEl = binType==='ones'  ? document.getElementById('binO')
              : binType==='tens'  ? document.getElementById('binT')
              :                     document.getElementById('binH');

  if (binType==='ones')         binOnes     += count;
  else if (binType==='tens')    binTens     += count;
  else                          binHundreds += count;

  const binRect = binEl.getBoundingClientRect();
  const destX   = binRect.left + binRect.width  / 2;
  const destY   = binRect.top  + binRect.height / 2;

  const sz = getBlockSize(type);
  const halfW = sz.w / 2, halfH = sz.h / 2;

  const MAX_VISUAL  = 9;  
  const visualCount = Math.min(count, MAX_VISUAL);
  const stagger     = Math.min(80, 500 / visualCount);

  for (let i = 0; i < visualCount; i++) {
    setTimeout(() => {
      const fly = document.createElement('div');
      fly.className = `block-fly ${type}`;
      fly.style.left       = (originX - halfW) + 'px';
      fly.style.top        = (originY - halfH) + 'px';
      fly.style.width      = sz.w + 'px';
      fly.style.height     = sz.h + 'px';
      fly.style.transition = 'none';
      
      if (type === 'ten-bar') {
        for (let s = 0; s < 10; s++) {
          const seg = document.createElement('div');
          seg.className = 'ten-seg';
          fly.appendChild(seg);
        }
      }

      document.body.appendChild(fly);

      requestAnimationFrame(() => requestAnimationFrame(() => {
        const dur    = 360 + Math.random() * 80;
        const jitterX = (Math.random() - 0.5) * 24;
        fly.style.transition = `left ${dur}ms cubic-bezier(0.42,0,1,1), top ${dur}ms cubic-bezier(0.28,0,0.72,1), opacity ${dur}ms`;
        fly.style.left    = (destX + jitterX - halfW) + 'px';
        fly.style.top     = (destY - halfH) + 'px';
        fly.style.opacity = '0.35';

        setTimeout(() => {
          fly.remove();
          const block = makeBlockEl(type);
          block.classList.add('block-settle');
          binEl.appendChild(block);
          const badge = binEl.querySelector('.bin-count');
          if (badge) binEl.appendChild(badge);

          binEl.classList.add('accepting');
          setTimeout(() => binEl.classList.remove('accepting'), 360);
          updateBinCounts();
          checkOverflows();
        }, dur);
      }));
    }, i * stagger);
  }

  if (count > MAX_VISUAL) {
    setTimeout(() => { updateBinCounts(); checkOverflows(); }, MAX_VISUAL * stagger + 480);
  }
}

function checkOverflows() {
  const bins = [
    { el: document.getElementById('binH'), count: binHundreds, type: 'hundreds' },
    { el: document.getElementById('binT'), count: binTens,     type: 'tens' },
    { el: document.getElementById('binO'), count: binOnes,     type: 'ones' },
  ];

  let anyOverflow = false;
  bins.forEach(({ el, count, type }) => {
    const over = count >= 10;
    if (over) anyOverflow = true;
    el.classList.toggle('overflow', over);
  });

  const overlay = document.getElementById('algLock');
  overlay.classList.toggle('active', anyOverflow);
}

function triggerRegroup(binEl, binType) {
  let toEl, carryClass;
  if (binType === 'ones') {
    if (binOnes < 10) return;
    binOnes -= 10;
    toEl      = document.getElementById('binT');
    binTens  += 1;
    carryClass = 'ten-bar';
  } else if (binType === 'tens') {
    if (binTens < 10) return;
    binTens -= 10;
    toEl      = document.getElementById('binH');
    binHundreds += 1;
    carryClass  = 'hundred-flat';
  } else {
    return;
  }

  rebuildBinDOM(binEl, binType);

  const fromRect = binEl.getBoundingClientRect();
  const toRect   = toEl.getBoundingClientRect();
  const sz       = getBlockSize(carryClass);
  const halfW    = sz.w / 2, halfH = sz.h / 2;

  const carry = document.createElement('div');
  carry.className = `carry-fly ${carryClass}`;
  
  if (carryClass === 'ten-bar') {
    for (let s = 0; s < 10; s++) {
      const seg = document.createElement('div');
      seg.className = 'ten-seg';
      carry.appendChild(seg);
    }
  } else if (carryClass === 'hundred-flat') {
    for (let s = 0; s < 100; s++) {
      const seg = document.createElement('div');
      seg.className = 'hund-seg';
      carry.appendChild(seg);
    }
  }

  carry.style.width      = sz.w + 'px';
  carry.style.height     = sz.h + 'px';
  carry.style.left       = (fromRect.left + fromRect.width/2  - halfW) + 'px';
  carry.style.top        = (fromRect.top  + fromRect.height/2 - halfH) + 'px';
  carry.style.transition = 'none';
  document.body.appendChild(carry);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    const dur = 420;
    carry.style.transition = `left ${dur}ms var(--spring), top ${dur}ms var(--spring), opacity ${dur}ms`;
    carry.style.left = (toRect.left + toRect.width/2  - halfW) + 'px';
    carry.style.top  = (toRect.top  + toRect.height/2 - halfH) + 'px';

    setTimeout(() => {
      carry.remove();
      const block = makeBlockEl(carryClass);
      block.classList.add('block-settle');
      toEl.appendChild(block);
      const badge = toEl.querySelector('.bin-count');
      if (badge) toEl.appendChild(badge);

      toEl.classList.add('accepting');
      setTimeout(() => toEl.classList.remove('accepting'), 360);
      updateBinCounts();
      checkOverflows();
    }, dur);
  }));

  updateBinCounts();
  checkOverflows();
}

function rebuildBinDOM(binEl, binType) {
  const blockClass = binType==='ones' ? 'cube' : binType==='tens' ? 'ten-bar' : 'hundred-flat';
  const logCount   = binType==='ones' ? binOnes : binType==='tens' ? binTens : binHundreds;

  binEl.querySelectorAll('.cube, .ten-bar, .hundred-flat').forEach(e=>e.remove());

  const showCount = Math.min(logCount, 9);
  for (let i = 0; i < showCount; i++) {
    binEl.appendChild(makeBlockEl(blockClass));
  }
  const badge = binEl.querySelector('.bin-count');
  if (badge) binEl.appendChild(badge);
}

function updateBinCounts() {
  const setCount = (id, n) => {
    const el = document.getElementById(id);
    el.textContent = n;
    el.classList.toggle('show', n > 0);
  };
  setCount('cntH', binHundreds);
  setCount('cntT', binTens);
  setCount('cntO', binOnes);
}

const _prev = {};

function updateAlg(A, B) {
  _setFactor(A, 'aA_T','aA_O');
  _setFactor(B, 'aB_T','aB_O');
}

function _setFactor(f, tId, oId) {
  const tel = document.getElementById(tId);
  const oel = document.getElementById(oId);
  if (!tel||!oel) return;
  if (!f.total) { tel.textContent=''; oel.textContent=''; return; }
  if (f.T > 0) {
    _popAD(tId, f.T, 't');
    _popAD(oId, f.O, 'o');
  } else {
    tel.textContent = '';
    _popAD(oId, f.O, 'o');
  }
}

function _popAD(id, val, col) {
  const el = document.getElementById(id);
  if (!el) return;
  const s = val===''||val===null?'':String(val);
  if (_prev[id]===s) return;
  _prev[id]=s;
  el.textContent=s;
  el.className='ad '+col;
  if (s!=='') { el.classList.add('pop'); setTimeout(()=>el.classList.remove('pop'),400); }
}

function buildBanks() {
  const bT = document.getElementById('bankTop');
  const bR = document.getElementById('bankRight');
  bT.innerHTML=''; bR.innerHTML='';
  bT.appendChild(makeSrc('ten','h'));
  bT.appendChild(makeSrc('one','h'));
  bR.appendChild(makeSrc('ten','v'));
  bR.appendChild(makeSrc('one','v'));
}

function makeSrc(kind, axis) {
  const el = document.createElement('div');
  el.className = `src src-${kind}-${axis}`;
  el.draggable = true;
  el.title = kind==='ten'?'10':'1';
  el.addEventListener('dragstart', e => {
    e.dataTransfer.setData('kind', kind);
    e.dataTransfer.setData('axis', axis);
    e.dataTransfer.effectAllowed = 'copy';
  });
  el.addEventListener('click', () => {
    if (axis==='h') addTop(kind==='ten'?10:1);
    else            addRight(kind==='ten'?10:1);
  });
  return el;
}

document.getElementById('binO').addEventListener('click', () => {
  if (binOnes >= 10) triggerRegroup(document.getElementById('binO'), 'ones');
});
document.getElementById('binT').addEventListener('click', () => {
  if (binTens >= 10) triggerRegroup(document.getElementById('binT'), 'tens');
});
document.getElementById('binH').addEventListener('click', () => {});

document.getElementById('gCanvas').addEventListener('dblclick', e => {
  const tgt = e.target;
  const canvas = document.getElementById('gCanvas');
  const az     = document.getElementById('arrayZone');
  const svg    = document.getElementById('gridSVG');
  if (tgt===canvas||tgt===az||tgt===svg||tgt.tagName==='line') {
    topSegs=[]; rightSegs=[];
    sweepState='idle'; sweepX=0;
    binOnes=0; binTens=0; binHundreds=0;
    Object.keys(_prev).forEach(k=>delete _prev[k]);
    document.querySelectorAll('.squeegee,.sweep-fill,.harvest-fill,.quad-ghost,.block-fly,.carry-fly').forEach(e=>e.remove());
    ['binO','binT','binH'].forEach(id => {
      document.getElementById(id).querySelectorAll('.cube,.ten-bar,.hundred-flat').forEach(e=>e.remove());
      document.getElementById(id).classList.remove('overflow','accepting');
    });
    document.getElementById('algLock').classList.remove('active');
    updateBinCounts();
    layout();
  }
});

document.getElementById('zoomSlider').addEventListener('input', e => {
  const z = e.target.value;
  document.documentElement.style.setProperty('--zoom', z);
  document.documentElement.style.setProperty('--block-zoom', Math.min(z * 0.85, 1.4));
  buildBanks();
  layout();
});

buildBanks();
triggerAutoZoom();
layout();
</script>
</body>
</html>
